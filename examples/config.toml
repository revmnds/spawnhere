# ~/.config/spawnhere/config.toml
#
# All fields are optional — spawnhere runs fine with no file at all. Copy this
# to `~/.config/spawnhere/config.toml` and edit to taste.

# Terminal used when invoking `spawnhere --term` (or `-t`). Falls back to the
# `$TERMINAL` environment variable, then `kitty`.
default_term = "kitty"

# Per-app bounding-box post-processing. Keys match the first whitespace-
# separated token of the chosen `Exec=` line (absolute paths are stripped, so
# `/usr/bin/kitty -1 fish` matches `[rules.kitty]`).
#
# Fields (all optional):
#   min_width   — floor for bbox.w in pixels (bumps small strokes up)
#   min_height  — floor for bbox.h in pixels
#   cell_px     — [cell_w, cell_h] in pixels. If set, the final bbox.w / bbox.h
#                 are rounded DOWN to the nearest multiple of cell size so
#                 terminal windows land on integer column/row boundaries.
#                 A drawn rectangle becomes a clean N×M cell grid.
#
# NOTE: these rules only apply when the user actually drew a bbox. A bare
# click (no drag) tells spawnhere "open this app at its natural size", and
# the per-app min_width / min_height are intentionally *not* enforced in
# that case — otherwise clicks would always expand into the rule footprint.

[rules.kitty]
min_width = 480
# Typical kitty cell at 16pt Fira Code on a 1× display. Adjust to match your
# font — run `kitty +kitten panel --help` or inspect your kitty font metrics.
cell_px = [10, 22]

[rules.foot]
min_width = 480
cell_px = [9, 18]

[rules.firefox]
min_width = 1200
min_height = 800

[rules.code]
# VS Code — generous floor so the side panels are usable.
min_width = 1100
min_height = 700

# Gesture behaviour. Defaults match the Photoshop/Figma convention:
#
#   drag          → rectangle (the new default — matches every design tool)
#   Shift + drag  → rectangle constrained to 1:1 (square)
#   Alt + drag    → freehand (the legacy spawnhere mode; the bbox of your stroke
#                   is the spawn zone — draw a squiggle, the letter R, whatever)
#   click (no drag) → window opens centred on the click at `click_spawn_*` size
#
# Anything below `drag_threshold_px` of travel counts as a click, so a tiny
# jitter between press and release no longer spawns a sliver window.
#
# Freehand lives on Alt (not Ctrl) because Ctrl is already reserved for
# "escape from --default into the picker" at release time — overloading it
# would silently change the stroke shape every time a pinned-app user wanted
# the picker for one spawn.
#
# To restore the pre-rectangle-default era:
#
#   [gesture]
#   default = "freehand"
#
# `square_modifier` and `freehand_modifier` accept "shift", "ctrl", or "alt".
# If you flip `default = "freehand"`, `square_modifier` degrades to a plain
# rectangle (the 1:1 constraint can't attach to a freehand stroke).
#
# `min_width` / `min_height` are a global floor for any drawn bbox — a tiny
# drag gets bumped up to this size centred on the drawn region. Per-app
# `[rules.<class>]` entries apply on top and can raise the floor further.
# Set to 0 to disable the global floor entirely.
#
# `click_spawn_width` / `click_spawn_height` control what a click-without-drag
# spawns as: a window of that size centred on the click. Omit either (or set
# to 0) to fall back to "app's natural size at the click point".

[gesture]
default            = "rectangle"
square_modifier    = "shift"
freehand_modifier  = "alt"
drag_threshold_px  = 5.0
show_dimensions    = true
min_width          = 320
min_height         = 200
click_spawn_width  = 720
click_spawn_height = 480
