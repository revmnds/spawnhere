# Spawnhere — Hyprland bindings
#
# Flow:
#   1. Press the bind → the overlay appears, screen dims.
#   2. Click + drag to draw a rectangle (hold SHIFT for a crisp rect, or
#      release SHIFT for a freehand sketch — either way the bounding box of
#      what you draw is the spawn area). Click without drag = spawn at the
#      app's natural size at the click point.
#   3. On release: either the picker opens (pick an app → Enter), or the
#      preset spawns directly (with --spawn, --term, or --default).
#
# Copy one of the pairs below into ~/.config/hypr/hyprland.conf (or a sourced
# file) and reload with `hyprctl reload`.

# ── Recommended: default + picker pair ───────────────────────────────────
# Super + `        → spawn the pinned default app (set one with Ctrl+P in
#                    the picker). Falls back to the picker on first use.
# Super + Shift + `→ full picker (fuzzy search, pin/unpin, forget recent).
#                    Also the way to change the default.
bind = SUPER, grave, exec, spawnhere --default
bind = SUPER SHIFT, grave, exec, spawnhere

# ── Terminal on tap ──────────────────────────────────────────────────────
# Skips the picker entirely, spawns $TERMINAL (or config.default_term).
# bind = SUPER, t, exec, spawnhere --term

# ── Fixed app per bind ───────────────────────────────────────────────────
# If you never want a picker and just have a bind per app:
# bind = SUPER ALT, b, exec, spawnhere --spawn "firefox"
# bind = SUPER ALT, e, exec, spawnhere --spawn "thunar"
