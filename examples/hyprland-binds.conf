# Spawnhere — Hyprland bindings (hold mode)
#
# Hold the bind to keep the overlay open. Inside the overlay:
#   • Click + drag → draw the area
#   • Release click (while still holding bind) → spawn the app at that bbox
#   • Release the bind without drawing → cancel
#   • ESC or right-click → also cancel
#
# Copy any of these into ~/.config/hypr/hyprland.conf (or a sourced file)
# and reload with `hyprctl reload`.

# ── Draw a terminal ────────────────────────────────────────────────────────
bind = SUPER, grave, exec, spawnhere --spawn "kitty"

# ── Draw a browser ─────────────────────────────────────────────────────────
# bind = SUPER_SHIFT, grave, exec, spawnhere --spawn "firefox"

# ── Draw a file manager ────────────────────────────────────────────────────
# bind = SUPER_ALT, grave, exec, spawnhere --spawn "thunar"
